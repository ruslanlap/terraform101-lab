name: Terraform Budget Check

on:
  pull_request:
    paths:
      - ec2-assignment-2/**
      - .github/workflows/budget.yaml
  push:
    branches:
      - main
      - master
    paths:
      - ec2-assignment-2/**
      - .github/workflows/budget.yaml
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  budget-check:
    name: Infracost estimate + budget guardrail
    runs-on: ubuntu-latest
    env:
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
      BUDGET_CAP_USD: "20"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Infracost API key
        run: |
          if [ -z "${INFRACOST_API_KEY}" ]; then
            echo "INFRACOST_API_KEY is missing. Add it in repository secrets."
            exit 1
          fi

      - name: Setup Infracost
        uses: infracost/actions/setup@v3

      - name: Generate cost estimate JSON
        run: |
          infracost breakdown \
            --path ec2-assignment-2 \
            --terraform-var host_os=linux \
            --format json \
            --out-file /tmp/infracost.json

      - name: Post/update PR cost comment
        if: github.event_name == 'pull_request'
        run: |
          infracost comment github \
            --path /tmp/infracost.json \
            --repo "${{ github.repository }}" \
            --github-token "${{ secrets.GITHUB_TOKEN }}" \
            --pull-request "${{ github.event.pull_request.number }}" \
            --behavior update

      - name: Enforce monthly budget cap
        run: |
          MONTHLY_COST=$(jq -r '.totalMonthlyCost // "0"' /tmp/infracost.json)
          echo "Estimated monthly cost: ${MONTHLY_COST} USD"

          awk -v cost="${MONTHLY_COST}" -v cap="${BUDGET_CAP_USD}" 'BEGIN {
            if ((cost + 0) > (cap + 0)) {
              printf("Budget check failed: monthly cost %.2f exceeds cap %.2f\n", cost, cap);
              exit 1;
            }
            printf("Budget check passed: monthly cost %.2f is within cap %.2f\n", cost, cap);
          }'

      - name: Update README budget section
        if: github.event_name != 'pull_request'
        run: |
          python3 - <<'PY'
          import datetime
          import json
          import textwrap
          from collections import defaultdict
          from pathlib import Path

          readme = Path("README.md")
          infracost = Path("/tmp/infracost.json")

          data = json.loads(infracost.read_text())

          def to_float(value):
            try:
              return float(value)
            except (TypeError, ValueError):
              return 0.0

          total_monthly = to_float(data.get("totalMonthlyCost"))
          total_hourly = to_float(data.get("totalHourlyCost"))
          if total_hourly == 0 and total_monthly > 0:
            total_hourly = total_monthly / 730
          total_daily = total_hourly * 24

          services = defaultdict(lambda: {"hourly": 0.0, "daily": 0.0, "monthly": 0.0})
          for project in data.get("projects", []):
            for resource in project.get("breakdown", {}).get("resources", []):
              service_name = resource.get("resourceType") or resource.get("name") or "unknown"
              monthly = to_float(resource.get("monthlyCost"))
              hourly = to_float(resource.get("hourlyCost"))
              if hourly == 0 and monthly > 0:
                hourly = monthly / 730
              daily = hourly * 24

              services[service_name]["hourly"] += hourly
              services[service_name]["daily"] += daily
              services[service_name]["monthly"] += monthly

          service_rows = []
          for service_name, costs in sorted(services.items(), key=lambda item: item[1]["monthly"], reverse=True):
            service_rows.append(
              f"| `{service_name}` | {costs['hourly']:.6f} | {costs['daily']:.4f} | {costs['monthly']:.3f} |"
            )

          if not service_rows:
            service_rows.append("| _No billable resources detected_ | 0.000000 | 0.0000 | 0.000 |")

          service_table = "\n".join(service_rows)
          generated_at = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          section = textwrap.dedent(f"""\
          <!-- budget:start -->
          ## Potential Budget (ec2-assignment-2)

          Estimated monthly cost in `eu-central-1` for the current setup:

          | Metric | Value |
          | --- | ---: |
          | **Estimated total (hourly)** | **{total_hourly:.6f} USD / hour** |
          | **Estimated total (daily)** | **{total_daily:.4f} USD / day** |
          | **Estimated total (monthly)** | **{total_monthly:.3f} USD / month** |
          | Budget cap | 20 USD / month |
          | Last updated | {generated_at} |

          ### Service breakdown

          | Service | Hourly (USD) | Daily (USD) | Monthly (USD) |
          | --- | ---: | ---: | ---: |
          {service_table}

          Notes:
          - Generated automatically by `.github/workflows/budget.yaml` using Infracost.
          - Estimate excludes outbound data transfer spikes, snapshots, and additional resources.

          <!-- budget:end -->
          """).strip()

          content = readme.read_text()
          start = "<!-- budget:start -->"
          end = "<!-- budget:end -->"

          if start in content and end in content:
            before = content.split(start)[0].rstrip()
            after = content.split(end, 1)[1].lstrip()
            readme.write_text(f"{before}\n\n{section}\n\n{after}".rstrip() + "\n")
          else:
            readme.write_text(content.rstrip() + "\n\n" + section + "\n")
          PY

      - name: Commit README changes
        if: github.event_name != 'pull_request'
        run: |
          if git diff --quiet README.md; then
            echo "No README changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update README budget estimate"
          git push
